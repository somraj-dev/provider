# Docker Build
name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - { name: frontend, dockerfile: infrastructure/docker/frontend.Dockerfile }
          - { name: backend, dockerfile: infrastructure/docker/backend.Dockerfile }
          - { name: ai-service, dockerfile: infrastructure/docker/ai-service.Dockerfile }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # TODO: Configure container registry login
      # - name: Login to Registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ${{ secrets.REGISTRY_URL }}
      #     username: ${{ secrets.REGISTRY_USERNAME }}
      #     password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: false  # TODO: Enable push after configuring registry
          tags: axiovital/${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
