# AxioVital Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: axiovital-ingress
  namespace: axiovital
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    # TODO: Configure TLS
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  rules:
    - host: app.axiovital.local  # TODO: Use real domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 3000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 4000
          - path: /ai
            pathType: Prefix
            backend:
              service:
                name: ai-service-svc
                port:
                  number: 8000
  # TODO: Add TLS configuration
  # tls:
  #   - hosts:
  #       - app.axiovital.local
  #     secretName: axiovital-tls
