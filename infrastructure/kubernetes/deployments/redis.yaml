# AxioVital Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: axiovital
  labels:
    app: redis
    app.kubernetes.io/part-of: axiovital-provider
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-storage
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
      volumes:
        - name: redis-storage
          persistentVolumeClaim:
            claimName: redis-pvc
