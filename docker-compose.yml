# ============================================
# AxioVital Provider Operating Environment
# Docker Compose — Local Development
# ============================================

services:
  # ---- Application Services ----

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:4000
      - NEXT_PUBLIC_AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      - backend
    networks:
      - axiovital-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/backend.Dockerfile
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://axiovital_user:change-me-in-production@postgres:5432/axiovital
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENSEARCH_URL=http://opensearch:9200
      - AI_SERVICE_URL=http://ai-service:8000
      - JWT_SECRET=change-me-in-production
      - CORS_ORIGINS=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_started
    networks:
      - axiovital-network
    restart: unless-stopped

  ai-service:
    build:
      context: .
      dockerfile: infrastructure/docker/ai-service.Dockerfile
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=axiovital-ai
      - DATABASE_URL=postgresql://axiovital_user:change-me-in-production@postgres:5432/axiovital
      - REDIS_URL=redis://redis:6379
      - BACKEND_URL=http://backend:4000
      - LOG_LEVEL=info
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - axiovital-network
    restart: unless-stopped

  # ---- Data Services ----

  postgres:
    build:
      context: .
      dockerfile: infrastructure/docker/postgres.Dockerfile
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=axiovital
      - POSTGRES_USER=axiovital_user
      - POSTGRES_PASSWORD=change-me-in-production
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - axiovital-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axiovital_user -d axiovital"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    build:
      context: .
      dockerfile: infrastructure/docker/redis.Dockerfile
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - axiovital-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  opensearch:
    build:
      context: .
      dockerfile: infrastructure/docker/opensearch.Dockerfile
    ports:
      - "9200:9200"
      - "9600:9600"
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - axiovital-network
    restart: unless-stopped

# ---- Networks ----
networks:
  axiovital-network:
    driver: bridge

# ---- Volumes ----
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  opensearch-data:
    driver: local
